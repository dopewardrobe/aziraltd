<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZIRA LTD</title>
<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}
body{
font-family:Segoe UI,sans-serif;
background:#f8fafc;
overflow-x:hidden;
line-height:1.6;
}
header{
position:sticky;
top:0;
background:#0f2b5b;
color:white;
padding:20px;
}
.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:120px 20px;
background:linear-gradient(rgba(15,43,91,.8),rgba(15,43,91,.8));
color:white;
text-align:center;
}
.hero h1{
font-size:4rem;
}
.card-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}
.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}
@media(max-width:768px){
.hero h1{
font-size:2.3rem;
}
.card-grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>
<header>
<h2>AZIRA LTD</h2>
</header>
<section class="hero">
<div>
<h1>Creating Exceptional Events</h1>
<p>Exhibitions • Conferences • Corporate Experiences</p>
</div>
</section>
<section>
<h2>Overview</h2>
<div class="card-grid">
<div class="card">
<h1>500+</h1>
<p>Events Managed</p>
</div>
<div class="card">
<h1>50K+</h1>
<p>Attendees</p>
</div>
<div class="card">
<h1>120+</h1>
<p>Partners</p>
</div>
<div class="card">
<h1>98%</h1>
<p>Client Satisfaction</p>
</div>
</div>
</section>
</body>
</html>
